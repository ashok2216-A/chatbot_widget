name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-validation:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Syntax Check
        run: python -m compileall backend/

  frontend-validation:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: widget/frontend/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./widget/frontend
        run: npm install
        
      - name: Build Widget Bundle
        working-directory: ./widget/frontend
        run: npm run build
