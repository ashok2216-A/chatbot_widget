name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-validation:
    name: 🐍 Backend (Python 3.11)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Syntax Check
        run: python -m compileall backend/

      - name: Run Backend Tests
        run: |
          pip install pytest httpx
          pytest backend/tests/

  frontend-validation:
    name: ⚛️ Frontend (Node.js 20)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/widget/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./frontend/widget
        run: npm install
        
      - name: Run Frontend Tests
        working-directory: ./frontend/widget
        run: npm run test

      - name: Build Widget Bundle
        working-directory: ./frontend/widget
        run: npm run build

  pipeline-summary:
    name: 🚀 Pipeline Summary
    needs: [detect-changes, backend-validation, frontend-validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "### 🚀 Pipeline Summary — chatbot-widget" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job Area | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          # Backend Status
          if [ "${{ needs.backend-validation.result }}" == "success" ]; then
            echo "| 🐍 Backend | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.backend-validation.result }}" == "skipped" ]; then
            echo "| 🐍 Backend | ⚪ Skipped (No changes) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🐍 Backend | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Frontend Status
          if [ "${{ needs.frontend-validation.result }}" == "success" ]; then
            echo "| ⚛️ Frontend | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.frontend-validation.result }}" == "skipped" ]; then
            echo "| ⚛️ Frontend | ⚪ Skipped (No changes) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚛️ Frontend | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚡ *Powered by Antigravity CI Engine*" >> $GITHUB_STEP_SUMMARY
